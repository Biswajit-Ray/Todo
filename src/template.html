<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stride | Productivity Unlocked</title>
</head>
<body>
    
    <nav class="app-nav">
        <div class="nav-logo">
            <span class="logo-icon">🏃</span>
            <span class="logo-text">Stride</span>
        </div>
    </nav>

    <main class="app-layout">

        <aside id="motivation">
            </aside>

        <section id="todoList">
            <h2 id="Project">
                Project: <span id="ProjectName">All Tasks 🌍</span>
            </h2>
            
            <button id="AddTodoBTN" aria-label="Create a new task">Add a Task</button> 
        </section>

        <aside id="projectList">
            <h2>Project List:</h2>
            
            <div class="project-card" data-name="all">
                <h4 class="projectName">All Tasks 🌍</h4>
                <p class="projectNote">View everything at once</p>
            </div>
            
            <button id="AddProjectbtn" aria-label="Create a new project">New Project+</button>
        </aside>
    </main>
</body>
</html>
